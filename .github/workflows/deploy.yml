name: Deploy to GitHub Pages

on:
  push:
    branches:
      - claude/tenant-profile-website-rdw1uc
      - main
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; cancel superseded runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Pages
        # Provides deployment context. Requires Pages to be enabled once in
        # Settings -> Pages -> Source: "GitHub Actions".
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          # Served from https://<user>.github.io/TenantShowcase/
          NEXT_PUBLIC_BASE_PATH: /TenantShowcase

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
